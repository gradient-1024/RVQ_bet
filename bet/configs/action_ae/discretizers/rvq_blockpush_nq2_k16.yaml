_target_: models.action_ae.discretizers.residual_vq.ResidualVQVAEActionDiscretizer
action_dim: ${env.action_dim}
num_quantizers: 2
codebook_size: 16
embedding_dim: ${env.action_dim}
hidden_dim: 128
hidden_depth: 0
device: ${device}
predict_offsets: True
train_steps: 1000
batch_size: 1024
learning_rate: 1e-3
weight_decay: 1e-4
commitment_loss_scale: 0.25
codebook_loss_scale: 1.0
reconstruction_loss: mse
normalize_actions: True
kmeans_init: True
kmeans_iters: 50
dead_code_restart_interval: 50
dead_code_threshold: 0
usage_log_interval: 50
restart_noise_scale: 0.01
verbose: True
